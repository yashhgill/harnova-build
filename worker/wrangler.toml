name = "harnova-build"
main = "src/index.js"
compatibility_date = "2026-06-01"

# The dashboard SPA is served as static assets from ../web/dist.
# run_worker_first lets /api/* and non-app hostnames hit the worker.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
ROOT_DOMAIN = "harnova.my"
APP_HOST = "build.harnova.my"
BILLPLZ_BASE = "https://www.billplz.com"   # sandbox: https://www.billplz-sandbox.com
PRICE_SEN = "1000"

# Routes: the wildcard picks up every hosted site.
routes = [
  { pattern = "build.harnova.my/*", zone_name = "harnova.my" },
  { pattern = "*.harnova.my/*", zone_name = "harnova.my" }
]

# Secrets (run these once):
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put BILLPLZ_KEY
#   wrangler secret put BILLPLZ_XSIGNATURE
#   wrangler secret put BILLPLZ_COLLECTION
